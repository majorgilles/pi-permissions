name: Publish pi extension packages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Publish npm packages and GitHub releases
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Publish unpublished pi extension packages and releases
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t manifests < <(
            find . -name package.json \
              -not -path "*/.git/*" \
              -not -path "*/node_modules/*" \
              -not -path "*/dist/*" \
              -not -path "*/build/*" \
              -print | sort
          )

          updated_any=0

          for manifest in "${manifests[@]}"; do
            package_dir="$(dirname "$manifest")"
            name="$(node -p "const p=require(process.argv[1]); p.name || ''" "$manifest")"
            version="$(node -p "const p=require(process.argv[1]); p.version || ''" "$manifest")"
            private_pkg="$(node -p "const p=require(process.argv[1]); String(p.private === true)" "$manifest")"
            has_pi_extension="$(node -p "const p=require(process.argv[1]); String(Array.isArray(p.pi?.extensions) && p.pi.extensions.length > 0)" "$manifest")"

            if [ -z "$name" ] || [ -z "$version" ] || [ "$private_pkg" = "true" ] || [ "$has_pi_extension" != "true" ]; then
              echo "Skipping $manifest (not a public pi extension package)."
              continue
            fi

            if npm view "${name}@${version}" version >/dev/null 2>&1; then
              echo "Skipping npm publish for ${name}@${version}; already published."
            else
              if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
                echo "::error::Missing NPM_TOKEN secret. Add it in GitHub repository settings before publishing ${name}@${version}."
                exit 1
              fi

              echo "Publishing ${name}@${version} from ${package_dir}"
              (cd "$package_dir" && npm publish --access public --provenance)
              updated_any=1
            fi

            tag="v${version}"
            title="${name}@${version}"
            notes="Published \`${name}@${version}\` to npm."

            if gh release view "$tag" >/dev/null 2>&1; then
              echo "Skipping GitHub release ${tag}; already exists."
              continue
            fi

            if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
              echo "Creating GitHub release ${tag} for existing tag."
              gh release create "$tag" \
                --title "$title" \
                --notes "$notes" \
                --generate-notes \
                --verify-tag
            else
              echo "Creating GitHub release ${tag} for ${name}@${version}."
              gh release create "$tag" \
                --title "$title" \
                --notes "$notes" \
                --generate-notes \
                --target "$GITHUB_SHA"
            fi

            updated_any=1
          done

          if [ "$updated_any" -eq 0 ]; then
            echo "No unpublished pi extension package versions or missing GitHub releases found."
          fi
